services:
  backend:
    build: ./backend
    container_name: gomufi-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # Yerel geliştirme için URL'leri .env'den gelen değerlerin üzerine yaz
      - FRONTEND_URL=http://localhost:5173
      - BACKEND_URL=http://localhost:8000
      - REDIS_URL=redis://redis:6379/0
    command: >
      sh -c "alembic upgrade head || echo 'WARNING: Alembic migration failed, starting server anyway...' ;
             uvicorn main_fastapi:app --host 0.0.0.0 --port 8000 --reload"
    restart: "no"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

  frontend:
    build: ./frontend
    container_name: gomufi-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: "no"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/

  redis:
    image: redis:alpine
    container_name: gomufi-redis
    ports:
      - "6379:6379"
    restart: always
